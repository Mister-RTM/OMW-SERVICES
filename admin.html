<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test de Conexión Supabase</h1>
    
    <div>
        <input type="email" id="email" placeholder="Email" value="admin@example.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="testLogin()">Probar Login</button>
    </div>
    
    <div id="resultado" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        // ============================================
        // TUS DATOS DE SUPABASE (VERIFICA QUE SEAN CORRECTOS)
        // ============================================
        const SUPABASE_URL = 'https://nzbkaztxcprxeriisgmp.supabase.co';
        const SUPABASE_ANON_KEY = 'e39eb28998776ccbe438b9081060342426c92fc44f7978e50f5bf8f3149ed179';
        
        console.log('🚀 Iniciando prueba...');
        console.log('URL:', SUPABASE_URL);
        console.log('ANON_KEY (primeros 20 chars):', SUPABASE_ANON_KEY.substring(0, 20) + '...');

        // Crear cliente de Supabase
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Cliente Supabase creado');

        // Función para mostrar resultados
        function mostrarResultado(tipo, mensaje, datos = null) {
            const div = document.getElementById('resultado');
            div.innerHTML = `
                <strong>${tipo}:</strong> ${mensaje}<br>
                ${datos ? '<pre>' + JSON.stringify(datos, null, 2) + '</pre>' : ''}
            `;
        }

        // ============================================
        // PROBAR LOGIN
        // ============================================
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            mostrarResultado('⏳', 'Intentando login...');
            console.log('Intentando login con:', email);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('❌ Error de login:', error);
                    mostrarResultado('❌ ERROR', error.message, error);
                } else {
                    console.log('✅ Login exitoso:', data);
                    mostrarResultado('✅ ÉXITO', 'Login correcto', {
                        user: data.user.email,
                        session: !!data.session
                    });
                    
                    // Después del login, probar acceso a tabla orders
                    await testOrders();
                }
            } catch (err) {
                console.error('🔥 Error inesperado:', err);
                mostrarResultado('🔥 ERROR', err.message, err);
            }
        }

        // ============================================
        // PROBAR ACCESO A ORDERS
        // ============================================
        async function testOrders() {
            mostrarResultado('⏳', 'Probando acceso a tabla orders...');
            
            try {
                const { data, error } = await supabase
                    .from('orders')
                    .select('count', { count: 'exact', head: true });

                if (error) {
                    console.error('❌ Error accediendo a orders:', error);
                    mostrarResultado('❌ ERROR TABLA', error.message, error);
                } else {
                    console.log('✅ Acceso a orders OK');
                    mostrarResultado('✅ ÉXITO', 'Conexión a orders OK', { mensaje: 'Puedes leer la tabla' });
                }
            } catch (err) {
                console.error('🔥 Error inesperado:', err);
                mostrarResultado('🔥 ERROR', err.message, err);
            }
        }

        // ============================================
        // PROBAR CONEXIÓN BÁSICA
        // ============================================
        async function testConexion() {
            mostrarResultado('⏳', 'Probando conexión básica...');
            
            try {
                const { error } = await supabase.auth.getSession();
                if (error) {
                    throw error;
                }
                mostrarResultado('✅', 'Conexión básica OK');
            } catch (err) {
                mostrarResultado('❌', 'Error de conexión: ' + err.message);
            }
        }

        // Probar conexión al cargar la página
        testConexion();
    </script>
</body>
</html>

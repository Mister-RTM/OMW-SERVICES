<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - GTA Services (Modo Lectura)</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <h2>Panel de Administración - Pedidos Recientes</h2>
    <p>Mostrando pedidos sin necesidad de login (usando anon key)</p>
    <div id="ordersContainer"></div>
  </div>

  <script>
    // ============================================
    // CONFIGURACIÓN (USA TUS VALORES REALES)
    // ============================================
    const SUPABASE_URL = 'https://nzbkaztxcprxeriisgmp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56YmthenR4Y3ByeGVyaWlzZ21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIwMjU3MTEsImV4cCI6MjA1NzYwMTcxMX0.2CxMk3dAtffIGvO6QbM_FKfWetk77vOe-6rT0hE9kFk';
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // CARGAR PEDIDOS DIRECTAMENTE
    // ============================================
    async function loadOrders() {
      const container = document.getElementById('ordersContainer');
      container.innerHTML = 'Cargando pedidos...';

      try {
        // Intentar obtener pedidos
        const { data: orders, error } = await supabase
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(10);

        if (error) {
          throw error;
        }

        if (!orders || orders.length === 0) {
          container.innerHTML = '<p>No hay pedidos para mostrar</p>';
          return;
        }

        // Crear tabla
        let html = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Plataforma</th>
                <th>Discord</th>
                <th>Rockstar</th>
                <th>Servicios</th>
                <th>Detalles</th>
                <th>Estado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody>
        `;

        orders.forEach(order => {
          // Parsear servicios (son JSON en la BD)
          let servicios = 'Error al parsear';
          try {
            servicios = JSON.parse(order.services).join(', ');
          } catch (e) {
            servicios = order.services;
          }

          html += `
            <tr>
              <td>${order.id}</td>
              <td>${order.platform}</td>
              <td>${order.discord_username}</td>
              <td>${order.rockstar_username}</td>
              <td>${servicios}</td>
              <td>${order.console_details || '-'}</td>
              <td>${order.status}</td>
              <td>${new Date(order.created_at).toLocaleString()}</td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        container.innerHTML = html;

      } catch (error) {
        console.error('Error completo:', error);
        container.innerHTML = `
          <p style="color: red;">Error al cargar pedidos:</p>
          <pre>${JSON.stringify(error, null, 2)}</pre>
        `;
      }
    }

    // Cargar pedidos automáticamente al abrir la página
    loadOrders();
  </script>
</body>
</html>

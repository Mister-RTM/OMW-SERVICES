<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA Online Services</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <div class="container">
    <h1>⋆ ｡°✩ GTA ONLINE SERVICES ✩°｡ ⋆</h1>
    <div class="subhead">RUKI // ZO0LZS // STACKED CONSOLES</div>

    <form id="orderForm">
      <!-- Platform -->
      <label for="platform">🎮 PLATFORM</label>
      <select id="platform" name="platform" required>
        <option value="" disabled selected>– select –</option>
        <option value="PC">🖥️ PC</option>
        <option value="PS5">🎮 PS5</option>
        <option value="XBOX">❌ XBOX</option>
      </select>

      <!-- Ruki Services -->
      <h2>RUKI SERVICES</h2>
      <div class="services-grid">
        <label><input type="checkbox" name="service" value="Injected Deluxos/MK2"> Injected Deluxos/MK2 (3M/3.5M)</label>
        <label><input type="checkbox" name="service" value="Modded Heists"> Modded Heists (3.0–3.6M)</label>
        <label><input type="checkbox" name="service" value="Modded Outfits (Dunce)"> Modded Outfits (Dunce hat)</label>
        <label><input type="checkbox" name="service" value="Perm Speed Glitched Cars"> Perm Speed Glitched Cars</label>
        <label><input type="checkbox" name="service" value="Modded Cars F1"> Modded Cars (F1 wheels/colors)</label>
        <label><input type="checkbox" name="service" value="Modded Roulette"> Modded Roulette (330K)</label>
        <label><input type="checkbox" name="service" value="Level Change 1-777"> Level Change 1–777</label>
        <label><input type="checkbox" name="service" value="Gender Change"> Gender Change</label>
        <label><input type="checkbox" name="service" value="Maxed Bunker/CEO"> Maxed bunker/CEO/unlockables</label>
        <label><input type="checkbox" name="service" value="Perm God Mode Cars"> Perm God Mode Cars</label>
        <label><input type="checkbox" name="service" value="Unlock Achievements"> Unlock Achievements / trade prices</label>
        <label><input type="checkbox" name="service" value="Spoof IP"> Spoof IP</label>
      </div>

      <!-- Zo0lzs Services -->
      <h2>ZO0LZS SERVICES</h2>
      <div class="services-grid">
        <label><input type="checkbox" name="service" value="Permanent Fast Run"> Permanent Fast Run</label>
        <label><input type="checkbox" name="service" value="Free Shopping"> Free Shopping</label>
        <label><input type="checkbox" name="service" value="Deluxos/MK2 (Zo0lzs)"> Deluxos/MK2 (2.5M/3.2M)</label>
        <label><input type="checkbox" name="service" value="Modded Heists (Zo0lzs)"> Modded Heists (3.0–3.6M)</label>
        <label><input type="checkbox" name="service" value="Modded Outfits (no blacklist)"> Modded Outfits (no blacklist)</label>
        <label><input type="checkbox" name="service" value="Maxed Bunker/CEO (Zo0lzs)"> Maxed bunker/CEO/unlockables</label>
        <label><input type="checkbox" name="service" value="Modded Cars F1 (Zo0lzs)"> Modded Cars (F1 + colors)</label>
        <label><input type="checkbox" name="service" value="Gender Change (Zo0lzs)"> Gender Change</label>
        <label><input type="checkbox" name="service" value="Modded Roulette (Zo0lzs)"> Modded Roulette (330K)</label>
        <label><input type="checkbox" name="service" value="Level Change 1-777 (Zo0lzs)"> Level Change 1–777</label>
        <label><input type="checkbox" name="service" value="Unlock Achievements (Zo0lzs)"> Unlock Achievements / trade prices</label>
      </div>

      <!-- Stacked Console Accounts -->
      <h2>🎮 STACKED CONSOLE ACCOUNTS</h2>
      <div class="console-section">
        <label><input type="checkbox" name="service" value="Stacked Console Account"> Stacked Console Account (PS/XBOX) – includes modded cars, outfits, money</label>
        <label for="consoleDetails">📝 Console account details (budget / preferences):</label>
        <textarea id="consoleDetails" name="consoleDetails" rows="2" placeholder="e.g. 10M budget, all outfits..."></textarea>
      </div>

      <!-- User details -->
      <h2>YOUR CONTACT</h2>
      <label for="discord">💬 Discord username *</label>
      <input type="text" id="discord" name="discord" required>

      <label for="rockstar">⭐ Rockstar username *</label>
      <input type="text" id="rockstar" name="rockstar" required>

      <button type="submit" class="submit-btn">✅ PLACE ORDER</button>
    </form>
  </div>

  <script src="JS/main.js"></script>
</body>
</html>
